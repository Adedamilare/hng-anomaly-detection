# Configuration for Anomaly Detection Engine
slack:
  webhook_url: "hng-anomaly-detection.slack.com"

detection:
  z_score_threshold: 3.0
  rate_multiplier_threshold: 5.0
  sliding_window_seconds: 60
  baseline_window_minutes: 30
  baseline_recalc_interval_seconds: 60
  error_multiplier_threshold: 3.0

blocking:
  backoff_schedule:
    - "10m"
    - "30m"
    - "2h"
  permanent_after_attempts: 3

audit:
  log_file: "/var/log/detector/audit.log"

dashboard:
  port: 8080
  refresh_interval_seconds: 3
  host: "0.0.0.0"

monitoring:
  log_file_path: "/var/log/nginx/hng-access.log"
  log_format: "combined"  
  tail_position_file: "/var/log/detector/log_monitor.pos"

  slack:
  webhook_url: "hng-anomaly-detection.slack.com" 
  
  # Notifier configuration
  notifier:
    rate_limit_enabled: true
    min_alert_interval_seconds: 300  # Minimum 5 minutes between same alert type
    ip_alert_throttle_seconds: 3600   # Max 1 alert per IP per hour
    max_retries: 3
    retry_delay_seconds: 1
    timeout_seconds: 10