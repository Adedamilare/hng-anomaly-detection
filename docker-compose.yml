version: '3.8'

services:
  nextcloud:
    image: kefaslungu/hng-nextcloud:latest
    container_name: hng-nextcloud
    restart: unless-stopped
    volumes:
      - nextcloud_data:/var/www/html/data
    networks:
      - hng-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/status.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: hng-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    ports:
      - "80:80"
    networks:
      - hng-network
    depends_on:
      nextcloud:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  detector:
    build: ./detector
    container_name: hng-detector
    restart: unless-stopped
    # Fix: Use host network for iptables access (alternative to privileged)
    network_mode: "service:nginx"  # Share nginx's network namespace
    pid: "service:nginx"  # Share process namespace for iptables
    volumes:
      - nginx_logs:/var/log/nginx:ro
      - ./detector/config.yaml:/app/config.yaml:ro
      - detector_data:/app/data
    # Fix: Only add necessary capabilities
    cap_add:
      - NET_ADMIN
    depends_on:
      nginx:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost',8080)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  nextcloud_data:
    name: hng_nextcloud_data
  nginx_logs:
    name: hng_nginx_logs
  detector_data:
    name: hng_detector_data

networks:
  hng-network:
    driver: bridge