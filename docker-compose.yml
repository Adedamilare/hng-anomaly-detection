version: '3.8'

services:
  nextcloud:
    image: kefaslungu/hng-nextcloud:latest
    container_name: hng-nextcloud
    restart: always
    volumes:
      - nextcloud_data:/var/www/html/data
    networks:
      - hng-network

  nginx:
    image: nginx:alpine
    container_name: hng-nginx
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    ports:
      - "80:80"
    networks:
      - hng-network
    depends_on:
      - nextcloud

  detector:
    image: python:3.11-slim
    container_name: hng-detector
    restart: always
    working_dir: /app
    command: bash -c "apt-get update && apt-get install -y iptables && pip install pyyaml aiohttp jinja2 psutil && python main.py"
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
      - ./detector:/app
      - /var/run/docker.sock:/var/run/docker.sock
    network_mode: host
    privileged: true
    depends_on:
      - nginx

volumes:
  nextcloud_data:
  HNG-nginx-logs:
    name: HNG-nginx-logs

networks:
  hng-network:
    driver: bridge